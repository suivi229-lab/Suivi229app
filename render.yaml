services:
  - type: web
    name: suivi229app
    runtime: node
    buildCommand: npm install --legacy-peer-deps && npm run build
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: 20.19.0
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: OWNER_EMAIL
        value: gbeffansylvain@gmail.com
